    aliases: []
    definitions:
      - source: "KC-000003"
        definition: "민감도기준 리스크 시장데이터의 1 차 민감도에 기초한 리스크 시장데이터 변동성의 1 차 민감도에 기초한 리스크 델타 리스크로 포착하지 못하는 리스크의 증분 부도리스크 신용위험에 따른 불연속부도리스크 (Jump-to-default risk) 에 대한 자본량 잔여리스크 표준방법으로 모든 시장리스크를 포착하지 못한다는 점을 고려해 도입한 자본량 Delta 리스크 Vega 리스크 Curvature 리스크 22 민감도 기준 리스크 측정을 위해 리스크군 (Risk class), 리스크 요소 (Risk factor), 버킷 (Bucket), 리"
        original_term: "Default"
        definition_rank: "1"
      - source: "KC-000005"
        definition: "부도리스크 자본부과량 신용위험에 따른 불연속부도리스크 (Jump-to-default-risk) 에 대한 자본량 잔여리스크 자본부과량 표준방법으로 모든 시장 리스크를 포착하지 못한다는 점을 고려 , 기타 잔여리스크에 대응하기 위해 도입한 자본량 2 민감도 기준 리스크 측정을 위해 리스크군 (Risk class), 리스크 요소 (Risk factor), 버킷 (Bucket), 리스크 포지션 (Risk position) 에 대한 정의가 필요함 ."
        original_term: "Default"
        definition_rank: "2"
      - source: "KC-000006"
        definition: "DefaultRisk Executor Command : frtb."
        original_term: "Default"
        definition_rank: "3"
      - source: "KC-000009"
        definition: "server: port: < WebService_Port > urosys: data-source: default-database: uri: jdbc:log4jdbc:oracle:thin:@// <DBServer_IP_address> : <Port> / <Service_Name> account: “ <DB _ User> ” password: “ <Password> ” 기동 아래의 명령어를 입력하여 내장 웹 애플리케이션 서버로 해당 웹 애플리케이션을 기동합니다."
        original_term: "Default"
        definition_rank: "4"
      - source: "KC-000010"
        definition: "이 때, “ 후행작업을 실행하지 않음 ” 항목을 “Yes” (default “No” ."
        original_term: "Default"
