      - source: "KC-000003"
        definition: "매수 포지션은 +, 매도 포지션은 – P&L : 익스포져에 반영된 누적 MtM 손익으로 현재 시점의 시장가치에서 명목금액을 차감한 금액 매수 / 매도 포지션과 상관없이 이익은 +, 손실은 – 비유동화의 경우 LGD(Loss Given Default) 적용 ( 유동화는 P&L 만 사용 ) 종류 LGD 주식 , non-senior 채권 100% senior 채권 75% 커버드 본드 25% 회수율이 가치에 영향을 미치지 않는 상품 0% 97 부도리스크 산출 > 총 JTD 산출 총 JTD 산출을 위한 구성요소인 명목금액 , 채권등가시장가치"
        original_term: "Loss Given Default"
        definition_rank: "1"
      - source: "KC-000022"
        definition: "내부등 급모형은 크게 두 가지로 나뉘는데 , 1) 간단한 Foundation option 의 경우 부도확률 ( Probability of Default: PD) 추정만을 허용하며 , 2 ) 복잡한 Advanced option 은 이에 더하여 Loss Given Default(LGD ) 의 추정까지를 가능하도록 한다"
        original_term: "Loss Given Default"
        definition_rank: "2"
