        definition: "RStudio UTF-8 설정 Tools > Global Options > Code > Saving Default text encoding = UTF-8 입력 JURO-Market 시스템 설치 C 드라이브 밑에 urosys 폴더를 생성하고 그 안에 openeyes 와 urosys.r.risk 를 복사 합니다."
        original_term: "Default"
