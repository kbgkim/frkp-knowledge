  - id: "CAN-GLO-000036"
    canonical_term: "Volatility"
    aliases: []
    definitions:
      - source: "KC-000005"
        definition: "민감도 기준 리스크 Vega 리스크 민감도 𝑆 𝑘 = 𝑣𝑒𝑔𝑎 ∗ 𝑖𝑚𝑝𝑙𝑖𝑒𝑑 𝑣𝑜𝑙𝑎𝑡𝑖𝑙𝑖𝑡𝑦 = 𝜎 𝑉 𝑖 𝜕 𝜎 𝑖 ∙ 𝜎 𝑖 𝜎 𝑖 𝑉 𝑖 : 옵션 i 의 내재변동성 (implied volatility) : 변동성의 함수로 표현되는 옵션 i 의 평가금액 : 기초자산 변동성 변화에 따른 옵션가치의 변화 𝑆 𝑘 : Vega 리스크 민감도 𝑣𝑒𝑔𝑎 옵션 내재변동성은 기 정의한 vega 리스크 요소에 따라 하나 또는 둘 이상의 만기구간으로 배분되어야 함 아"
        original_term: "Volatility"
        definition_rank: "1"
      - source: "KC-000015"
        definition: "수익률이 동일하고 독립적인 IID (Identically and independent distributed) -Normal 분포를 따른다고 가정하지만, 실제 변동성에는 군집현상(Volatility Clustering)이 나타남 ."
        original_term: "Volatility"
        definition_rank: "2"
      - source: "KC-000023"
        definition: "내재변동성(Implied Volatility) PAGEREF _Toc35937268 \\h 35 5.4."
        original_term: "Volatility"
        definition_rank: "3"
    preferred_definition: "KC-000005"
    source_documents:
      - "KC-000005"
      - "KC-000015"
      - "KC-000023"
