canonical_glossary:
  - id: "CAN-GLO-000001"
    canonical_term: "Backtesting"
    aliases: []
    definitions:
      - source: "KC-000016"
        definition: "일별로 적절한 사후검증(backtesting)을 실시하여야 하며 사후검증절차, 사후검증결과에 따른 필요한 조치 등을 내규에 명시하고 이를 준수할 것 다."
        original_term: "Backtesting"
        definition_rank: "1"
    preferred_definition: "KC-000016"
    source_documents:
      - "KC-000016"
  - id: "CAN-GLO-000002"
    canonical_term: "Basel II"
    aliases: []
    definitions:
      - source: "KC-000003"
        definition: "BASEL III 표준방법 시장리스크 소개 2023."
        original_term: "Basel II"
        definition_rank: "1"
      - source: "KC-000022"
        definition: "반면 BIS 의 Basel Committee 는 \"Basel II “에서 신용 , 시장 , 운영 , 금리리스크 , 유동성리스크 및 기타리스크 ( 평판리스크， 전략리스크 )등 으로 리스크 를 분류하고 있다"
        original_term: "Basel II"
        definition_rank: "2"
    preferred_definition: "KC-000022"
    source_documents:
      - "KC-000003"
      - "KC-000022"
  - id: "CAN-GLO-000003"
    canonical_term: "Basel III"
    aliases: []
    definitions:
      - source: "KC-000003"
        definition: "BASEL III 표준방법 시장리스크 소개 2023."
        original_term: "Basel III"
        definition_rank: "1"
      - source: "KC-000022"
        definition: "이러한 개선 필요성 때문에 Basel III 에 대한 논의가 시작되었다"
        original_term: "Basel III"
        definition_rank: "2"
    preferred_definition: "KC-000022"
    source_documents:
      - "KC-000003"
      - "KC-000022"
  - id: "CAN-GLO-000004"
    canonical_term: "Capital Ratio"
    aliases: []
    definitions:
      - source: "KC-000003"
        definition: "배경 RBC(Risk Based Capital) : 국제보험감독자협의회 주관 Solvency II : EU 보험 법률 지침 NCR(Net Operating Capital Ratio) : 순자본비율 ."
        original_term: "Capital Ratio"
        definition_rank: "1"
      - source: "KC-000016"
        definition: "그러나 계량모델을 사용하더라도 역위기상황분석의 질적인 속성을 고려하여야 함 < 역위기상황분석 예시(트레이딩 포트폴리오의 경우 )> 󰊱 시행착오법 ① 대형손실, 자금조달 실패로 인한 유동성 부족 및 규제자본비율 미달 등 금융투자회사가 생존할 수 없는 상황(이하 “한계상황”)에 대한 정의 예) 한계상황을 영업용순자본비율(NCR; net capital ratio)이 150%를 하회하는 것으로 정의 ② 한계상황을 유발시킬 수 있는 초기사건(initial event)*을 가정하고, 정치 ‧ 경제 지식 등을 이용하여 초기사건으로 인해 발생가"
        original_term: "Capital Ratio"
        definition_rank: "2"
    preferred_definition: "KC-000016"
    source_documents:
      - "KC-000003"
      - "KC-000016"
  - id: "CAN-GLO-000005"
    canonical_term: "Capital Requirement"
    aliases: []
    definitions:
      - source: "KC-000005"
        definition: "Minimum capital requirements for market risk (BCBS, rev."
        original_term: "Capital Requirement"
        definition_rank: "1"
      - source: "KC-000022"
        definition: "BIS 비율 = 자기자본 위험가중자산 ≥8% 위험가중자산 = 자산규모 × 위험가중치 정의 자본요구량( Capital Requirement) 금융기관들의 리스크를 커버하기 위하여 보유할 것을 요구 받는 적정 규모의 자기 자본량 B IS 의 규제자본은 예상치 않은 손실을 대비한 것이다."
        original_term: "Capital Requirement"
        definition_rank: "2"
    preferred_definition: "KC-000022"
    source_documents:
      - "KC-000005"
      - "KC-000022"
  - id: "CAN-GLO-000006"
    canonical_term: "Correlation"
    aliases: []
    definitions:
      - source: "KC-000003"
        definition: "민감도 기준 리스크 High Correlation Scenario 기준 Low Correlation Scenario 기준 상관계수 MIN( 기준 상관계수 *1.25, 100%) MAX( 기준 상관계수 *2-100%, 기준 상관계수 *75%) 3 가지 금융시장 환경 변화 시나리오를 가정한 상관계수 적용 리스크 포지션 의 리스크 요소별 민감도 측정 버킷 내 리스크 요소간 상관계수 ( p kl ) 를 적용해 리스크군별 리스 크 량 을 산출 리스크 군내 버킷간 상관계수 ( r bc ) 를 적용 , 리스크군별 리스크량 산출 시나리오별 리스크"
        original_term: "Correlation"
        definition_rank: "1"
      - source: "KC-000022"
        definition: "이에 반해 , 상관계수 ( correlation coefficient ) 는 분산의 크기와 상관없이 두 변수간 선형종속성 ( li near dependence) 를 측정하는데 좋은 지표가 된다"
        original_term: "Correlation"
        definition_rank: "2"
      - source: "KC-000042"
        definition: "UROSYS OpenEyes 프라이서 Click, Pop-Up 1 2 [ 프라이서 ( Pricer )] 특정 평가그룹 ( ValGroup ) 에 속한 상품의 가치평가 및 민감도 (Greek) 계산을 처리하는 모듈 ① 프라이서 목록 업무구분별 프라이서 관리 : Front-Middle-Back Office 부서별 분리된 프라이서 관리 환경 제공 ② 프라이서 상세 정보 기본정보 ID, 버전 ( 이력관리용 ), Audit 정보 마켓데이터 입력 마켓데이터 선택 : Price, YieldCurve , Dividend( 연속 , 이산 ), Vo"
        original_term: "Correlation"
        definition_rank: "3"
    preferred_definition: "KC-000003"
    source_documents:
      - "KC-000003"
      - "KC-000022"
      - "KC-000042"
