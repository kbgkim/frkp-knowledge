        definition: "상품명 민감도 유형 MD PV01 Convexity Delta Gamma Vega Theta Rho CDS (Credit Default Swap) ● IRS (Interest Rate Swap) ● ● FX Seagull ● ● ● ● ● Commodity Basket Knock Out Call Option (원금보장) ● ● ● ● ● Power Spread Note ● ● ● ● FX Spot/Forward, FX Swap ● ● ● CRS (Currency Rate Swap) ● ● ELS (Step Down Autocall)"
        original_term: "Default"
        definition_rank: "8"
      - source: "KC-000036"
        definition: "R M04N540( 신용집중위험액산출기본)테이블은 거래상대방별 위험액결과정보를 적재하는 테이블 로 본 테이블을 구성하는 상세 컬럼 및 유효값은 다음과 같음 신용집중위험액산출기본 (R M04N540) 컬럼논리명 컬럼설명 유효값 회사코드 미래에셋그룹의 회사코드 DEFAULT : 005 미래에셋증권 기준일자 기준일자 RM작업구분코드 테이블 작업 주기 D : daily M : monthly 시나리오ID DEFAULT : 1 RM조직코드 RM조직코드 거래상대방I D 거래상대방 법인번호 혹은 사업자번호 R M 금리위험금액 R M 금리위험금액"
        original_term: "Default"
        definition_rank: "9"
      - source: "KC-000042"
        definition: "[ 컨텍스트 (Context)] 평가요청 처리와 관련된 모든 설정정보를 저장하고 있는 관리 단위로써 , 마켓데이터 , 프라이서 및 모형 파라미터 등 정보를 포함하고 있음 ① 컨텍스트 관리 업무구분별 컨텍스트 관리 : Front-Middle-Back Office 부서별 분리된 컨텍스트 관리 환경 제공 ② 마켓데이터 설정 통화별 , 기초자산별 Risk-free 커브 , Dividend, Volatility 등 설정 특정 상품유형이나 특정 상품별로 위 기본값 (default) 으로 설정된 마켓데이터를 사용하지 않고 , 다른 마켓데이터 적"
        original_term: "Default"
        definition_rank: "10"
