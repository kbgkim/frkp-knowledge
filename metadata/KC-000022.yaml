  glossary:
    - term: "Basel II"
      definition: "반면 BIS 의 Basel Committee 는 \"Basel II “에서 신용 , 시장 , 운영 , 금리리스크 , 유동성리스크 및 기타리스크 ( 평판리스크， 전략리스크 )등 으로 리스크 를 분류하고 있다"
      source_document: "KC-000022"
    - term: "Basel III"
      definition: "이러한 개선 필요성 때문에 Basel III 에 대한 논의가 시작되었다"
      source_document: "KC-000022"
    - term: "Capital Requirement"
      definition: "BIS 비율 = 자기자본 위험가중자산 ≥8% 위험가중자산 = 자산규모 × 위험가중치 정의 자본요구량( Capital Requirement) 금융기관들의 리스크를 커버하기 위하여 보유할 것을 요구 받는 적정 규모의 자기 자본량 B IS 의 규제자본은 예상치 않은 손실을 대비한 것이다."
      source_document: "KC-000022"
    - term: "Correlation"
      definition: "이에 반해 , 상관계수 ( correlation coefficient ) 는 분산의 크기와 상관없이 두 변수간 선형종속성 ( li near dependence) 를 측정하는데 좋은 지표가 된다"
      source_document: "KC-000022"
    - term: "Credit Risk"
      definition: "3) Credit Risk P o l icy : 현재와 미래의 신용노출에 기초하여 파생상품 각각에 대한 신용노출을 측정해야 한다고 권고 ."
      source_document: "KC-000022"
    - term: "CVA"
      definition: "같은 의미로 사용되는 용어로는 c onditional value at risk (CVaR), average value at risk (AVaR), 그리고 Expected Shortfall ( ES ) 등 이 있다"
      source_document: "KC-000022"
    - term: "Default"
      definition: "내부등 급모형은 크게 두 가지로 나뉘는데 , 1) 간단한 Foundation option 의 경우 부도확률 ( Probability of Default: PD) 추정만을 허용하며 , 2 ) 복잡한 Advanced option 은 이에 더하여 Loss Given Default(LGD ) 의 추정까지를 가능하도록 한다"
      source_document: "KC-000022"
    - term: "Expected Shortfall"
      definition: "Expected Tail Loss (ETL, Expected Shortfall) PAGEREF _Toc30575576 \\h 114 10.1."
      source_document: "KC-000022"
    - term: "Loss Given Default"
      definition: "내부등 급모형은 크게 두 가지로 나뉘는데 , 1) 간단한 Foundation option 의 경우 부도확률 ( Probability of Default: PD) 추정만을 허용하며 , 2 ) 복잡한 Advanced option 은 이에 더하여 Loss Given Default(LGD ) 의 추정까지를 가능하도록 한다"
      source_document: "KC-000022"
    - term: "Margin"
