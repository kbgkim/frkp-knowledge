    - term: "Monte Carlo Simulation"
      definition: "Parametric VaR, Monte Carlo Simulation VaR 등 이 전자의 경우에 해당되고 , Historica l Simulation VaR 는 후자의 경우에 해당된다"
      source_document: "KC-000022"
    - term: "NCR"
