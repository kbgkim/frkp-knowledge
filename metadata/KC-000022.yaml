  summary: "시장리스크(M arket Risk) 의 정의 시장리스크는 주가 , 금리 , 환율 등 시장가격의 변동에 따라 금융기관의 손익 또는 자산가치가 변동할 위험 , 수익증권의 경우 기준지수나 벤치마크 포트폴리오 대비 상대적 평가를 하는 추적오차리스크 ( Risk of Tracking Error ) , 파생상품 등 을 이용하여 위험을 헤지할 때 헤지대상 자산과 헤지수단 자산간의 불일치에서 오는 Basis Risk 와 위험요인의 변동과 상품가격 변동의 비선형 관계에서 오는 Gamma Risk 등 을 포괄한다 개별주식의 가치 산출 방법 R isk Factor 사용 예 가치 산출 방식 개별종목의 수익률 H istorical VaR, Historical Scenario 개별 종목의 수익률 이용, 직접 산출 주가지수의 수익률 사용자 정의 시나리오, Monte Carlo 시뮬레이션 주가지수와 개별주식수익률의 민감도( β) 이용하여 개별주식의 수익률 산출 후 가치 계산 채권(B onds) 채권은 개별채권의 현금흐 름을 적정한 이자율 로 할인하여 가치를 산출한 후 , 장부가치 ( B/S 평가금액 ) 와의 차이만큼을 보정하여 사용한다 상품의 Parametric VaR Parametric VaR 계산 VaR=α x T x + 1 2 y T y R isk Fa c tor 들의 분산-공분산 행렬 , 신뢰도, 보유기간 Delta/Gamma Positions P osition Vector 계산 D elta/Gamma Position 상품 1 차 2 차 민감도 I nstrument-Risk Factor 1 차, 2 차 민감도 계산 Risk F actor 들의 수익률에 대한 Historical Volatility 계산 (MA, EWMA, …, etc) I nstrument-Factor..."
