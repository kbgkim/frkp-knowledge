semantic:
  summary: "2장에서는, FRTB 애플리케이션 에서 산출된 표준방법 시장리스크 메트릭을 민감도기준 리스크, 부도리스크 및 잔여리스크 등 3 개 영역으로 나누어서 조회하는 기능을 기술합니다. [ Figure STYLEREF 1 \\s 1 SEQ Figure \\* ARABIC \\s 1 4 ] 화면 잠금 시장리스크 이 장에서는 바젤I II 표준방법 시장 위험액을 구성하는 민감도기준 리스크, 부도리스크 및 잔여리스크를 포트폴리오 별, 버킷별 및 편입 포지션별로 조회하는 기능을 기술합니다. 시장리스크 규제자본을 의미하는 총리스크는 민감도기준 리스크, 부도리스크 및 잔여리스크 등 3 개 리스크 금액을 단순 합산한 금액 으로 산출됩니다."
