  summary: "유로인스트루먼츠에서 공급하는 U ROSYS FRTB 애플리케이션 (이하 FRTB 애플리케이션 또는 애플리케이션 ) 는 바젤I V 표준방법( SA; Standard Approach)에 의한 금융기관의 보유 포지션에 대한 시장위험액을 산출하는 소프트웨어 프로그램으로써, 애플리케이션 에서 요구하는 기초데이터를 입력으로 다양한 위험지표(이하 메트릭 ; Metric )를 산출하는 배치 프로그램과, 산출된 메트릭을 조회하는 화면 프로그램들로 구성됩니다. #!/bin/sh echo “stop Admin Scheduler” P ROC_NM=admin-scheduler- {버전} .jar f user -k $PROC_NM echo “Admin Scheduler Startup” n ohup java -jar - Dcom.sun.management.jmxremote - Dcom.sun.management.jmxremote.port =9999 - Dcom.sun.management.jmxremote.ssl =false -Dcom.sun.management.jmxremote.authenticate=far.log 2>admin-scheduler-err.log < /dev/null & Admin 작업 스케줄러 종료 Terminal 프로그램을 이용하여, A dmin 작업 스케줄러 애플리케이션 설치 디렉토리 (admin-scheduler) 로 이동 후 shotdown.sh 쉘스크립트 파일을 실행하여 스케줄러를 종료할 수 있습니다. #!/bin/sh f user -k admin-scheduler- {버전} .jar FRTB 애플리케이션 기동과 종료 F RTB 웹 애플리케이션 기동 과 종료 F RTB 웹 애플리케이션 기동 Terminal 프로그램을 이용하여, FRTB 웹 애플리케이션 설치 디렉토리 (${ frtb-web.home }) 로 이동 후 다음 명령어를 입력하여 기동합니다."
