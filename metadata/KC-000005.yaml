  summary: "현행 표준방법 ( 바젤 2.5) 신표준방법 ( 바젤 3) 시장리스크 일반시장 리스크 개별리스크 금리 주식 FX 상품 부도 잔여 시장리스크 민감도기준 리스크 잔여리스크 Delta 리스크 부도리스크 Vega 리스크 Curvature 리스크 시장가격 변동 신용도 변동 (CSR) 1 신표준방법 기본구조 및 주요 부도리스크 자본부과량 신용위험에 따른 불연속부도리스크 (Jump-to-default-risk) 에 대한 자본량 잔여리스크 자본부과량 표준방법으로 모든 시장 리스크를 포착하지 못한다는 점을 고려 , 기타 잔여리스크에 대응하기 위해 도입한 자본량 2 민감도 기준 리스크 측정을 위해 리스크군 (Risk class), 리스크 요소 (Risk factor), 버킷 (Bucket), 리스크 포지션 (Risk position) 에 대한 정의가 필요함 . 16 민감도 기준 리스크 산출 과정 리스크 포지션의 리스크 요소별 민감도를 산출한 후 리스크 클래스별로 3 가지 금융시장 환경 변화 상관계수 시나리오를 반영한 버킷내 및 버킷간 리스크량을 산출하고 , 리스크군별 리스크량을 단순합산하여 최종 자본량을 산출함 ."
