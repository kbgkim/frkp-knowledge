  glossary:
    - term: "Backtesting"
      definition: "일별로 적절한 사후검증(backtesting)을 실시하여야 하며 사후검증절차, 사후검증결과에 따른 필요한 조치 등을 내규에 명시하고 이를 준수할 것 다."
      source_document: "KC-000016"
    - term: "Capital Ratio"
      definition: "그러나 계량모델을 사용하더라도 역위기상황분석의 질적인 속성을 고려하여야 함 < 역위기상황분석 예시(트레이딩 포트폴리오의 경우 )> 󰊱 시행착오법 ① 대형손실, 자금조달 실패로 인한 유동성 부족 및 규제자본비율 미달 등 금융투자회사가 생존할 수 없는 상황(이하 “한계상황”)에 대한 정의 예) 한계상황을 영업용순자본비율(NCR; net capital ratio)이 150%를 하회하는 것으로 정의 ② 한계상황을 유발시킬 수 있는 초기사건(initial event)*을 가정하고, 정치 ‧ 경제 지식 등을 이용하여 초기사건으로 인해 발생가"
      source_document: "KC-000016"
