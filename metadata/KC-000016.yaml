      definition: "ES ∝ X =E[X|X≥ VaR ∝ X ] ⇒ α에서 1까지 구간의 모든 VaR 값의 평균 바젤III의 ES 산출 바젤 III에서는 리스크팩터에 유동성시계(Liquidity horizon) 를 적용하 여 스트레스 상황을 Calibration 한 ES(Stress-calibrated Expected Shortfall)을 산출하도록 함."
