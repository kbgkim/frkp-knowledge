summary: "조회 조건 ( a ): 상품 민감도를 조회할 때 사용할 업무구분, 평가 Batch, 시나리오, 종목 , 평가일, 민감도유형, 리스크팩터, 평가그룹, 프라이서 등의 조회 조건을 설정합니다. 조회 조건 (b): 포지션 평가 결과를 조회할 때 사용할 업무구분, 평가 Batch, 시나리오, 결과값유형, 평 가일, 운용펀드, 평가그룹, 프라이서, 포트폴리오명, 종목, 리스크팩터 등의 조회 조건을 설정합니다. 항목명 설명 시나리오 평가에 사용한 시나리오 계약코드 평가를 산출하는 계약의 코드 민감도 유형 해당 민감도의 유형 팩터I D 민감도 산출에 사용한 리스크팩터 1차 민감도 해당 상품의 팩터에 대한 1차 민감도 2차 민감도 해당 상품의 팩터에 대한 2 차 민감도 Cashflow: 해당 Task 에서 계산한 현금흐름 관련 정보가 표시됩니다."
