summary: "특정 버킷 부도리스크 상세조회 1) 버킷영역의 특정 행(특정 버킷) 더블클릭시 해당 버킷내 부도리스크 계산 대상 익스포져 목록 및 중간결과값 조회 조회그리드 영역 (익스포져) 익스포져 거래상대방 ID - 동일 거래상대방은 셀머지하여 표시 익스포져 거래상대방명 - 동일 거래상대방은 셀머지하여 표시 익스포져 상품 ID 익스포져 상품명 익스포져의 시장가치 (평가금액) 이미 발생한 익스포져의 누적 시가평가 손익 = 시장가치 - 명목원금 매입/매도 구분. 1년 이상인 경우는 총JTD리스크와 동일 신용등급 부도시 발생가능한 익스포져 단위의 손실금액 - 매입 : max(0, LGD x 명목원금 + 시가평가 손익) - 매도 : min(0, LGD x 명목원금 + 시가평가 손익) 거래상대방 신용등급 - 동일 거래상대방은 셀머지하여 표시 거래상대방 신용등급별 위험가중치 - 동일 거래상대방은 셀머지하여 표시 가. 시나리오 수행 후, 특정항목 값 수정 2) 새로운 설정ID 입력 4) [다른 ID로 저장] 버튼 클릭 [FRTB-RW-U010] 위험가중치 설정 - 비유동화 부도리스크 비유동화 부도리스크 위험가중치 설정 /frtb/rwConfig (TAB:DRC1) 가."
