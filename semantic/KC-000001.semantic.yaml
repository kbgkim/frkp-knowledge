summary: "UROSYS Suite 거래 ( 신규 / 해약 / 중간금 / 상환 ) 이벤트 포지션 거래 확정 시장가 수익률 커브 배당 변동성 상관 계수 평가 엔진 VaR Stress Test 표준모형 위험액 이론가 민감도 (Greek) 시뮬 레이션 분개 ( 회계 ) 결제 평가 (MTM) P&L ( 매매 / 평가 ) 거래 검토 Financial Instrument ( 금융상품 ) Front Office Back Office Middle Office Integrated Pricing Unit 사후 검증 가상 손익 한도 모니 터링 외평 가격 구성도 | 전체 구성도 4 UROSYS Suite 는 금융기관의 Front, Back 및 Middle Office 부서의 업무시스템 구축을 위한 다양한 애플리케이션 ( 이하 앱 ) 들로 구성되어 있습니다 Admin 시스템 구성을 위한 기본 앱으로써 , 운영에 필요한 각종 공통 데이터 관리 및 기능 제공 앱 ( 라이센스 ) 관리 메뉴 관리 작업 및 작업 배치 스케줄 관리 사용자 / 부서 및 권한 관리 접속 로그 및 실행이력 모니터링 설정 값 및 코드 관리 필수 Instrument 다양한 금융상품 유형별 발행정보 관리 주식 , 채권 , 장내파생상품 ( 선물 , 옵션 ) 및 장외파생상품 등 발행정보 관리 데이터 제공처로부터의 발행정보 입수 및 적재 FrontRunner 에서 입력된 OTC 상품정보 조회 필수 MarketData 다양한 유형의 시장데이터 관리 및 시스템 자체계산 평가 파라미터 관리 주가지수 / 주가 , 금리 , 환율 , 배당..."
