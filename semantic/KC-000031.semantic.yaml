summary: "영업용순자본비율(구NCR) — 보조 지표 2016년 개편 이전의 영업용순자본비율(舊NCR)은 현재 규제 지표로는 사용되지 않으나, 위험 민감도를 직접 반영한다는 점에서 신용평가사·실무에서 보완적으로 참고된다. 기본 등식: 영업용순자본 ≥ 총위험액 ⇔ 순자본(잉여자본) ≥ 0 순자본비율 = (영업용순자본 − 총위험액) ÷ 필요유지자기자본 × 100 (≥ 100%) 산정의 기본원칙 — ① 자산·부채·자본은 업무보고서의 연결재무제표(종속회사 미보유 시 개별재무제표)상 장부가액 기준 ② 시장위험과 신용위험을 동시에 내포하는 자산은 둘 다 ① 영업용순자본 순재산액(총자산−총부채) − 차감항목 + 가산항목(후순위차입금 등) ② 총위험액 시장위험액(주식·금리·외환·집합투자증권등·일반상품·옵션) + 신용위험액 + 운영위험액(집합투자재산위험액 포함) ③ 필요유지자기자본 인가·등록 업무단위별 최저자기자본의 70% 합계 ④ 순자본비율 (① − ②) ÷ ③ × 100 ⟹ 100% 이상 유지 업무보고서(별책서식 제17호)에서는 위 ①~④ 항목과 잉여자본(①−②)을 전월말·당월말 및 증감으로 비교 보고하며, 분기(또는 반기)별로 외부감사인 검토보고서를 첨부한다."
