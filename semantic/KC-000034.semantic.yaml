summary: "영업용순자본비율 = 영업용순자본 시장위험액 + 신용위험액 + 운영위험액 × 100(%) 순자본비율 = 영업용순자본 -( 시장위험액 + 신용위험액 + 운영위험액 ) 법정자기자본 ×70% × 100(%) 영업용순자본 , 시장위험액 , 신용위험액 , 운영위험액 및 법정자기자본의 산정을 위한 업무요건은 다음 각 장에서 상세히 기술한다 산정 프로세스 민감도 및 변동성 데이터 처리방안 ( 추후 ) 산정 대상 L1 L2 L3 차 감 가 산 주 식 금 리 외 환 집 투 상 품 옵 션 신 용 채권 국내채권 주식관련사채 ◐ ◐ ◐ 사모사채 ◐ ◐ ◐ ◐ ◐ 신주인수권증서 및 증권 ● ◐ ◐ 주식워런트증권 ● ● 장내파생옵션 옵션 주식옵션 ● ● 통화옵션 ● ● 장외파생상품 옵션 주식옵션 ● ◐ ● 금리옵션 ● ◐ ● 신용옵션 ◐ ● 통화옵션 ◐ ● 기타옵션 ◐ ● ● 기타 Range Accrual ● ◐ ● 주식관련채권 (CB ,EB,BW ) 주식관련채권은 행사가능기간과 기초주식의 가격 및 행사가격에 따라 옵션위험액 산정대상이 될 수 있다 실제 시나리오 적용 : 기존 포트폴리오에 특정 주식을 포함하여 유동성 및 분산도 충족여부를 재판단하여 위험액 및 NCR 산정 보수적 시나리오 적용 : 기존 포트폴리오의 위험액값은 고정시킨 후 추가되는 주식은 모두 유동성 및 분산도를 미충족으로 가정하여 개별위험값 12% 를 적용하고 , 그외 추가 포지션에 대한 위험액값만 기존 포트폴리오의 위험액값에 단순합산하여 전체 위험액 및 NCR 산정 ."
