summary: "요건정의서 : 시장VaR 바젤III 및 시장리스크 관리시스템 구축 Version 1 .4 사용 승인 한국수출입은행 Approv al : 승인자 : ( 인 ) 일자 : 확인자 : ( 인 ) 일자 : 검토자 : ( 인 ) 일자 : 유니타스 Approval: 승인자 : ( 인 ) 일자 : 작성자 : ( 인 ) 일자 : 개정이력 버전 작성자 개정내용 개정일자 1.0 오은영 신규 제정 2013 - 05 - 14 1.1 오은영 위기상황 분석 추가 2013-05-22 1.2 배신영 위기상황 분석 수정 2013-05-29 1.3 오은영 대상자산 추가 2013-05-31 1.4 오은영 데이터 입수현황 수정 2013-06-01 한국수출입은행 과 유니타스 의 사전 승인 없이 본 내용의 전부 또는 일부에 대한 복사,전재,배포,사용을 금함 . Risk Factor의 변화에 대한 포지션 변화의 민감도에 기초하여 보유 포지션의 가치변화를 계산하는데, 델타-노말 평가법, 델타-감마 평가법이 있음 . 금융기관의 유동성 악화 및 시장금리의 변동성 변화 등 주식리스크의 비중이 낮으며, 외환과 금리리스크의 비중이 절대적으로 높은 한국수출입은행 보유 포트폴리오 특성상 수익률곡선의 모양 및 기울기 등을 이용, 시나리오를 변화시킬 수 있도록 설계함 ."
